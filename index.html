<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>效率工具箱 - 专注+攒功德</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #333;
    }

    .page-title {
      font-size: 28px;
      margin: 20px 0 30px;
      color: #2d3748;
      font-weight: 600;
    }

    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card-title {
      font-size: 20px;
      margin-bottom: 20px;
      color: #4a5568;
      font-weight: 500;
    }

    /* 番茄钟 */
    .timer-display {
      font-size: 48px;
      font-weight: bold;
      color: #3b82f6;
      margin: 20px 0;
    }

    .time-input {
      width: 100px;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-secondary {
      background: #64748b;
      color: white;
    }

    .btn-reset {
      background: #ef4444;
      color: white;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    /* 木鱼样式（纯CSS绘制，真木鱼形状！） */
    .merit-count {
      font-size: 32px;
      font-weight: bold;
      color: #f59e0b;
      margin-bottom: 20px;
    }

    .muyu {
      width: 140px;
      height: 100px;
      background: #8b5cf6;
      border-radius: 50% 50% 20% 20%;
      margin: 0 auto 20px;
      position: relative;
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 6px 20px rgba(139,92,246,0.4);
    }

    .muyu::before {
      content: "";
      position: absolute;
      width: 60px;
      height: 12px;
      background: #7c3aed;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 6px;
    }

    .muyu::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 25px;
      background: #7c3aed;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 4px;
    }

    .muyu:active {
      transform: scale(0.92);
    }

    .tip {
      color: #8b5cf6;
      font-size: 16px;
      height: 24px;
    }

    /* 捐赠 */
    .donation {
      margin-top: 40px;
      text-align: center;
      max-width: 500px;
    }

    .donation-text {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .donation-btn {
      background: #ec4899;
      color: white;
      padding: 14px 32px;
      border-radius: 100px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-size: 16px;
    }

    /* 赞赏码弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      max-width: 320px;
    }

    .modal img {
      width: 220px;
      margin: 10px 0;
    }

    .close {
      margin-top: 10px;
      padding: 8px 16px;
      background: #666;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>

  <!-- ====================== Google Analytics ====================== -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8VLLFWN5B0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8VLLFWN5B0');
  </script>
</head>

<body>

  <h1 class="page-title">效率工具箱</h1>

  <div class="container">
    <!-- 番茄钟 -->
    <div class="card">
      <div class="card-title">🍅 番茄专注钟</div>
      <input type="number" class="time-input" id="focusTime" placeholder="分钟" value="25">
      <div class="timer-display" id="timer">25:00</div>
      <div class="btn-group">
        <button class="btn btn-primary" id="startBtn">开始</button>
        <button class="btn btn-secondary" id="pauseBtn">暂停</button>
        <button class="btn btn-reset" id="resetBtn">重置</button>
      </div>
    </div>

    <!-- 攒功德 -->
    <div class="card">
      <div class="card-title">🧘 佛系攒功德</div>
      <div class="merit-count" id="meritNum">功德：0</div>
      <div class="muyu" id="muyuBtn"></div>
      <div class="tip" id="meritTip"></div>
    </div>
  </div>

  <!-- 捐赠入口 -->
  <div class="donation">
    <p class="donation-text">
      随缘布施，功德无量<br>
      随意打赏，支持我继续优化工具 ✨
    </p>
    <button class="donation-btn" id="donateBtn">自愿赞赏</button>
  </div>

  <!-- 赞赏弹窗 -->
  <div class="modal" id="donateModal">
    <div class="modal-content">
      <h3>扫码赞赏</h3>
      <img src="https://img.alicdn.com/imgextra/i3/O1CN012CO0YU1VSfNs506ZS_!!6000000002652-2-tps-284-236.png" alt="赞赏码">
      <p>微信/支付宝均可</p>
      <button class="close" id="closeModal">关闭</button>
    </div>
  </div>

  <script>
    // ====================== 番茄钟 ======================
    let countdown;
    let timeLeft = 25 * 60;
    let isRunning = false;
    const timerEl = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const focusInput = document.getElementById('focusTime');

    function updateTimer() {
      const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const s = (timeLeft % 60).toString().padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
    }

    startBtn.addEventListener('click', () => {
      if (isRunning) return;
      const min = parseInt(focusInput.value) || 25;
      timeLeft = min * 60;
      isRunning = true;
      gtag('event', 'pomodoro_start', { duration: min });

      countdown = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) {
          clearInterval(countdown);
          isRunning = false;
          alert('专注完成！功德+10');
          gtag('event', 'pomodoro_complete');
        }
      }, 1000);
    });

    pauseBtn.addEventListener('click', () => {
      clearInterval(countdown);
      isRunning = false;
      gtag('event', 'pomodoro_pause');
    });

    // 重置功能
    resetBtn.addEventListener('click', () => {
      clearInterval(countdown);
      isRunning = false;
      focusInput.value = 25;
      timeLeft = 25 * 60;
      updateTimer();
      gtag('event', 'pomodoro_reset');
    });

    // ====================== 攒功德 ======================
    let merit = 0;
    const meritNum = document.getElementById('meritNum');
    const muyuBtn = document.getElementById('muyuBtn');
    const meritTip = document.getElementById('meritTip');

    muyuBtn.addEventListener('click', () => {
      merit++;
      meritNum.textContent = `功德：${merit}`;
      meritTip.textContent = '功德 +1 ✨';
      setTimeout(() => meritTip.textContent = '', 800);
      gtag('event', 'muyu_click', { total: merit });
    });

    // ====================== 捐赠弹窗 ======================
    const modal = document.getElementById('donateModal');
    document.getElementById('donateBtn').addEventListener('click', () => {
      modal.style.display = 'flex';
      gtag('event', 'donation_open');
    });
    document.getElementById('closeModal').addEventListener('click', () => {
      modal.style.display = 'none';
    });
  </script>

</body>
</html>
